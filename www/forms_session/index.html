<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>Login</title>
    <style>
        body { font-family: system-ui, -apple-system, Arial, sans-serif; margin: 0; padding: 32px; background: #f4f4f4; }
        .card { max-width: 360px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
        label { display: block; margin-bottom: 6px; font-weight: 600; }
        input { width: 100%; padding: 10px; margin-bottom: 14px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; }
        button { width: 100%; padding: 10px; background: #2f6fed; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background: #2459be; }
    </style>
</head>
<body>
    <div class="card">
        <h1>登入</h1>
        <form action="login.php" method="post">
            <label for="username">User</label>
            <input id="username" name="username" type="text" required>

            <label for="password">Pass</label>
            <input id="password" name="password" type="password" required>

            <button type="submit">送出</button>
        </form>
    </div>
</body>
</html>
